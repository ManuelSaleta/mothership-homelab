apiVersion: v1
kind: Namespace
metadata:
  name: networking
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: networking
  labels:
    app: pihole
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      nodeName: k3s-worker-01 # Keeps it pinned to your primary worker
      containers:
        - name: pihole
          image: pihole/pihole:latest
          env:
            - name: TZ
              value: "America/New_York"
            - name: WEBPASSWORD
              value: "AdminHomelabPass123"
            - name: FTLCONF_LOCAL_IPV4
              value: "192.168.50.242"
            # Modern configuration overrides for the FTL engine:
            - name: FTLCONF_dns_listeningMode
              value: "all"
            - name: FTLCONF_dns_upstreams
              value: "1.1.1.1;8.8.8.8"
          ports:
            - containerPort: 53
              name: dns-udp
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 80
              name: pihole-http
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: pihole-config
              mountPath: /etc/pihole
            - name: pihole-dnsmasq
              mountPath: /etc/dnsmasq.d
      volumes:
        # Maps storage directly to physical paths on k3s-worker-01
        - name: pihole-config
          hostPath:
            path: /var/data/pihole/config
            type: DirectoryOrCreate
        - name: pihole-dnsmasq
          hostPath:
            path: /var/data/pihole/dnsmasq
            type: DirectoryOrCreate
---
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-service
  namespace: networking
  annotations:
    # One IP address to rule them all
    metallb.universe.tf/loadBalancerIPs: "192.168.50.242"
spec:
  type: LoadBalancer
  selector:
    app: pihole
  ports:
    - port: 53
      targetPort: 53
      protocol: UDP
      name: dns-udp
    - port: 53
      targetPort: 53
      protocol: TCP
      name: dns-tcp
    - port: 80
      targetPort: 80
      protocol: TCP
      name: web-http
